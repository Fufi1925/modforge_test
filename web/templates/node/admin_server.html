<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{ guild.name }} – Admin</title><link rel="stylesheet" href="/static/style.css"><style>body{background:var(--bg);color:var(--fg);padding:24px;font-family:Outfit,system-ui}.card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px}.row{display:flex;align-items:center;gap:12px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}.btn{display:inline-flex;padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--fg);font-weight:700;cursor:pointer}.danger{background:rgba(239,68,68,.12);color:#fca5a5;border-color:rgba(239,68,68,.25)}.warn{background:rgba(245,158,11,.12);color:#fbbf24;border-color:rgba(245,158,11,.25)}.mono{font-family:'Geist Mono',monospace;color:var(--muted);font-size:.75rem}.avatar{width:42px;height:42px;border-radius:50%;object-fit:cover}.input{padding:8px 10px;border-radius:9px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--fg)}</style></head><body><div class="row" style="justify-content:space-between;margin-bottom:16px"><div><h1>🔐 {{ guild.name }}</h1><p class="mono">{{ guild.id }} · {{ members|length }} geladene Mitglieder</p></div><a class="btn" href="/admin/guilds">← Server</a></div><div class="card"><h2>⚙️ Config</h2><pre class="mono" style="white-space:pre-wrap;max-height:240px;overflow:auto">{{ config_json }}</pre></div><h2>👥 Mitglieder moderieren</h2><div class="grid">{% for m in members %}<div class="card"><div class="row"><img class="avatar" src="{{ m.avatar }}"><div style="flex:1"><b>{{ m.name }}</b><div class="mono">{{ m.id }}{% if m.bot %} · Bot{% endif %}</div></div></div><form method="post" action="/admin/server/{{ guild.id }}/member/{{ m.id }}/action" style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap"><input class="input" name="reason" placeholder="Grund" value="Admin Dashboard"><button class="btn warn" name="action" value="timeout" type="submit">Timeout</button><button class="btn warn" name="action" value="kick" type="submit">Kick</button><button class="btn danger" name="action" value="ban" type="submit">Ban</button></form></div>{% endfor %}</div></body></html>
