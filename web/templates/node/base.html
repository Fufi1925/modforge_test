<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ title or 'ModForge' }} – ModForge</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    :root{color-scheme:dark;--bg:#070712;--card:rgba(255,255,255,.055);--line:rgba(255,255,255,.11);--fg:#f8fafc;--muted:#94a3b8;--blue:#60a5fa;--green:#4ade80;--red:#fb7185;--yellow:#fbbf24;--violet:#8b5cf6}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#1e1b4b,#070712 55%);color:var(--fg);font-family:Inter,system-ui,Segoe UI,sans-serif;min-height:100vh}a{color:inherit;text-decoration:none}.top{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:rgba(5,5,16,.85);border-bottom:1px solid var(--line);position:sticky;top:0;backdrop-filter:blur(18px);z-index:10}.brand{display:flex;align-items:center;gap:10px;font-weight:900}.logo{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--violet));display:grid;place-items:center}.user{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.9rem}.user img{width:32px;height:32px;border-radius:50%}.wrap{max-width:1180px;margin:0 auto;padding:28px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.25)}.row{display:flex;align-items:center;gap:12px}.grow{flex:1;min-width:0}.muted{color:var(--muted)}.btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:rgba(255,255,255,.07);padding:9px 13px;border-radius:12px;font-weight:700;font-size:.85rem}.btn:hover{border-color:rgba(96,165,250,.45)}.primary{background:linear-gradient(135deg,#2563eb,#7c3aed);border:0}.danger{background:rgba(239,68,68,.14);border-color:rgba(239,68,68,.25);color:#fecaca}.ok{color:var(--green)}.warn{color:var(--yellow)}.badge{font-size:.68rem;padding:4px 9px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.05);font-weight:800}.servericon{width:48px;height:48px;border-radius:15px;object-fit:cover;background:rgba(255,255,255,.08);display:grid;place-items:center;font-weight:900}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.input{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:12px;color:var(--fg);padding:10px 12px;margin:6px 0 12px}.table{width:100%;border-collapse:collapse}.table td,.table th{padding:12px;border-bottom:1px solid var(--line);text-align:left}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.8rem;color:var(--muted)}h1{margin:0 0 8px}h2{margin:0 0 12px;font-size:1.1rem}
  </style>
</head>
<body>
<header class="top"><a class="brand" href="/"><span class="logo">🛡️</span><span>ModForge</span></a><nav class="actions"><a class="btn" href="/dashboard">Dashboard</a><a class="btn" href="/admin">Admin</a><a class="btn" href="/admin/pull">Pull</a><a class="btn primary" href="/invite">Bot einladen</a>{% if user %}<span class="user"><img src="{{ user.avatar_url }}"><span>{{ user.username }}</span></span>{% else %}<a class="btn" href="/login">Login</a>{% endif %}</nav></header>
<main class="wrap">{% block content %}{% endblock %}</main>
</body>
</html>
